# Detected by Railway monorepo auto-import for @dtc/storefront.
# Keep Root Directory empty (/) — shared npm workspace; Docker build context
# must be the repository root.
#
# NEXT_PUBLIC_* vars must be set on this service and enabled
# "Available at Build Time" (Variables → ⋮ → Available at Build Time).

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/storefront/Dockerfile"
watchPatterns = [
  "apps/storefront/**",
  "apps/storefront/Dockerfile",
  "package.json",
  "package-lock.json",
  ".npmrc",
  ".dockerignore",
]

[deploy]
# Absolute path + HOSTNAME override: Railway may overwrite ENV HOSTNAME with the
# container hostname, which breaks Next.js standalone binding / healthchecks.
startCommand = "sh -c 'HOSTNAME=0.0.0.0 exec node /app/apps/storefront/server.js'"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
