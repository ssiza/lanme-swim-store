# Detected by Railway monorepo auto-import for @dtc/backend.
# Keep Root Directory empty (/) — this is a shared npm workspace; Docker build
# context must be the repository root so package-lock.json and workspaces resolve.
#
# dockerfilePath is relative to the repository root (not this folder).

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/backend/Dockerfile"
watchPatterns = [
  "apps/backend/**",
  "apps/backend/Dockerfile",
  "package.json",
  "package-lock.json",
  ".npmrc",
  ".dockerignore",
]

[deploy]
# Migrate in startCommand — Railway preDeploy can be skipped when Config as Code
# path is unset; this keeps schema creation reliable on first boot.
startCommand = "sh -c 'npx medusa db:migrate && npx medusa start'"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
