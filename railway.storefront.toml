# Compatibility alias for existing Railway services that point here.
# Prefer apps/storefront/railway.toml (auto-detected on monorepo import).
# In Railway: Service → Settings → Config as Code → /apps/storefront/railway.toml

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/storefront/Dockerfile"
watchPatterns = [
  "apps/storefront/**",
  "apps/storefront/Dockerfile",
  "package.json",
  "package-lock.json",
  ".npmrc",
  ".dockerignore",
]

[deploy]
# Absolute path + HOSTNAME override: Railway may overwrite ENV HOSTNAME with the
# container hostname, which breaks Next.js standalone binding / healthchecks.
startCommand = "sh -c 'HOSTNAME=0.0.0.0 exec node /app/apps/storefront/server.js'"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
