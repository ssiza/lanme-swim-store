# Compatibility alias for existing Railway services that point here.
# Prefer apps/backend/railway.toml (auto-detected on monorepo import).
# In Railway: Service → Settings → Config as Code → /apps/backend/railway.toml

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/backend/Dockerfile"
watchPatterns = [
  "apps/backend/**",
  "apps/backend/Dockerfile",
  "package.json",
  "package-lock.json",
  ".npmrc",
  ".dockerignore",
]

[deploy]
startCommand = "sh -c 'npx medusa db:migrate && npx medusa start'"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
